services:
  - type: web
    name: rex-platform
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: HOST
        value: 0.0.0.0
      - key: REX_ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3-flash-preview
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: PERPLEXITY_MODEL
        value: sonar
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_OWNER
        value: SiddhantHatte
      - key: GITHUB_PORTFOLIO_REPO
        value: cybersecurity-portfolio
      - key: GITHUB_BRANCH
        value: main
